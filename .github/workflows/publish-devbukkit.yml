name: Publish DevBukkit Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v3.1.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish_devbukkit:
    if: github.repository_owner == 'uskyblock' && (github.event_name == 'workflow_dispatch' || !github.event.release.prerelease)
    runs-on: ubuntu-24.04
    env:
      CURSEFORGE_BASE_URL: https://minecraft.curseforge.com
      DEVBUKKIT_PROJECT_ID: "88748"
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag }}

      - name: JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Capture release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_CANDIDATE: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p .release-assets
          gh release view "${RELEASE_TAG_CANDIDATE}" --json tagName,name,body,isPrerelease > .release-assets/release.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          release = json.loads(Path(".release-assets/release.json").read_text(encoding="utf-8"))
          if release.get("isPrerelease"):
              raise SystemExit(f"Release {release['tagName']} is marked as a prerelease.")
          title = release.get("name") or release["tagName"]
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as env_file:
              env_file.write(f"RELEASE_TAG={release['tagName']}\n")
              env_file.write(f"RELEASE_VERSION={release['tagName'].removeprefix('v')}\n")
              env_file.write(f"RELEASE_TITLE={title}\n")
          Path(".release-assets/release-body.md").write_text(
              (release.get("body") or "") + "\n",
              encoding="utf-8",
          )
          PY

      - name: Capture supported Minecraft versions
        run: |
          set -euo pipefail
          version_spec="$(sed -n 's/^minecraftVersions=//p' gradle.properties | head -n 1)"
          if [ -z "${version_spec}" ]; then
            echo "minecraftVersions is not configured in gradle.properties." >&2
            exit 1
          fi
          echo "MINECRAFT_VERSIONS=${version_spec}" >> "${GITHUB_ENV}"

      - name: Verify tag matches Gradle version
        run: ./gradlew verifyReleaseTag -PreleaseTag="${RELEASE_TAG}" --no-daemon --no-configuration-cache

      - name: Download canonical GitHub release asset
        id: asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release download "${RELEASE_TAG}" --pattern 'uSkyBlock-*.jar' --dir .release-assets
          jar_path="$(find .release-assets -maxdepth 1 -type f -name 'uSkyBlock-*.jar' | head -n 1)"
          if [ -z "${jar_path}" ]; then
            echo "No release JAR asset found on ${RELEASE_TAG}." >&2
            exit 1
          fi
          echo "jar_path=${jar_path}" >> "${GITHUB_OUTPUT}"

      - name: Verify DevBukkit token is configured
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CURSEFORGE_API_TOKEN}" ]; then
            echo "CURSEFORGE_API_TOKEN secret is not configured." >&2
            exit 1
          fi

      - name: Publish to DevBukkit
        id: devbukkit
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
        run: |
          set -euo pipefail
          file_id="$(
            python3 .github/scripts/publish_devbukkit_release.py \
              --base-url "${CURSEFORGE_BASE_URL}" \
              --project-id "${DEVBUKKIT_PROJECT_ID}" \
              --api-token "${CURSEFORGE_API_TOKEN}" \
              --file "${{ steps.asset.outputs.jar_path }}" \
              --version "${RELEASE_VERSION}" \
              --title "${RELEASE_TITLE}" \
              --body-file .release-assets/release-body.md \
              --game-version-spec "${MINECRAFT_VERSIONS}" \
              --game-version-type-id 1 \
              --release-type release
          )"
          echo "file_id=${file_id}" >> "${GITHUB_OUTPUT}"

      - name: Summarize release
        run: |
          echo "DevBukkit file ${RELEASE_TAG} uploaded as file ID ${{ steps.devbukkit.outputs.file_id }}." >> "${GITHUB_STEP_SUMMARY}"
