name: Publish Modrinth Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v3.5.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish_modrinth:
    if: github.repository_owner == 'uskyblock' && (github.event_name == 'workflow_dispatch' || !github.event.release.prerelease)
    runs-on: ubuntu-24.04
    steps:
      # For a release trigger, build logic comes from the tag itself. For a manual
      # backfill, the tag may predate this workflow, so take the build logic from the
      # branch the run was dispatched on; the jar is downloaded from the release asset
      # regardless, so the checked-out source only provides the Minotaur task config.
      - name: Checkout build logic
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.event.release.tag_name }}

      - name: JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Capture release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_CANDIDATE: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p .release-assets
          gh release view "${RELEASE_TAG_CANDIDATE}" --json tagName,name,body,isPrerelease > .release-assets/release.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          release = json.loads(Path(".release-assets/release.json").read_text(encoding="utf-8"))
          if release.get("isPrerelease"):
              raise SystemExit(f"Release {release['tagName']} is marked as a prerelease.")
          title = release.get("name") or release["tagName"]
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as env_file:
              env_file.write(f"RELEASE_TAG={release['tagName']}\n")
              env_file.write(f"RELEASE_VERSION={release['tagName'].removeprefix('v')}\n")
          Path(".release-assets/release-body.md").write_text(
              f"# {title}\n\n" + (release.get("body") or "") + "\n",
              encoding="utf-8",
          )
          PY

      - name: Verify tag matches Gradle version
        if: ${{ github.event_name == 'release' }}
        run: ./gradlew verifyReleaseTag -PreleaseTag="${RELEASE_TAG}" --no-daemon --no-configuration-cache

      - name: Download canonical GitHub release asset
        id: asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release download "${RELEASE_TAG}" --pattern 'uSkyBlock-*.jar' --dir .release-assets
          jar_path="$(find .release-assets -maxdepth 1 -type f -name 'uSkyBlock-*.jar' | head -n 1)"
          if [ -z "${jar_path}" ]; then
            echo "No release JAR asset found on ${RELEASE_TAG}." >&2
            exit 1
          fi
          echo "jar_path=${jar_path}" >> "${GITHUB_OUTPUT}"

      - name: Verify Modrinth token is configured
        env:
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${MODRINTH_API_TOKEN}" ]; then
            echo "MODRINTH_API_TOKEN secret is not configured." >&2
            exit 1
          fi

      - name: Publish to Modrinth
        env:
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}
          MODRINTH_CHANNEL: release
          MODRINTH_JAR: ${{ steps.asset.outputs.jar_path }}
          MODRINTH_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          export MODRINTH_CHANGELOG="$(cat .release-assets/release-body.md)"
          ./gradlew :uSkyBlock-Plugin:modrinth --stacktrace --no-daemon --no-configuration-cache

      - name: Summarize release
        run: |
          echo "Modrinth release published for ${RELEASE_TAG}." >> "${GITHUB_STEP_SUMMARY}"
