name: Publish Hangar Release

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  publish_hangar:
    if: github.repository_owner == 'uskyblock' && !github.event.release.prerelease
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Capture release metadata
        env:
          RELEASE_TAG_FROM_EVENT: ${{ github.event.release.tag_name }}
          RELEASE_TITLE_FROM_EVENT: ${{ github.event.release.name }}
          RELEASE_BODY_FROM_EVENT: ${{ github.event.release.body }}
        run: |
          set -euo pipefail
          echo "RELEASE_TAG=${RELEASE_TAG_FROM_EVENT}" >> "${GITHUB_ENV}"
          echo "RELEASE_VERSION=${RELEASE_TAG_FROM_EVENT#v}" >> "${GITHUB_ENV}"
          if [ -n "${RELEASE_TITLE_FROM_EVENT}" ]; then
            echo "RELEASE_TITLE=${RELEASE_TITLE_FROM_EVENT}" >> "${GITHUB_ENV}"
          else
            echo "RELEASE_TITLE=${RELEASE_TAG_FROM_EVENT}" >> "${GITHUB_ENV}"
          fi
          {
            echo "HANGAR_CHANGELOG<<EOF"
            if [ -n "${RELEASE_TITLE_FROM_EVENT}" ]; then
              printf '# %s\n\n' "${RELEASE_TITLE_FROM_EVENT}"
            else
              printf '# %s\n\n' "${RELEASE_TAG_FROM_EVENT}"
            fi
            printf '%s\n' "${RELEASE_BODY_FROM_EVENT}"
            echo "EOF"
          } >> "${GITHUB_ENV}"

      - name: Verify tag matches Gradle version
        run: ./gradlew verifyReleaseTag -PreleaseTag="${RELEASE_TAG}" --no-daemon --no-configuration-cache

      - name: Download canonical GitHub release asset
        id: asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .release-assets
          gh release download "${RELEASE_TAG}" --pattern 'uSkyBlock-*.jar' --dir .release-assets
          jar_path="$(find .release-assets -maxdepth 1 -type f -name 'uSkyBlock-*.jar' | head -n 1)"
          if [ -z "${jar_path}" ]; then
            echo "No release JAR asset found on ${RELEASE_TAG}." >&2
            exit 1
          fi
          echo "jar_path=${jar_path}" >> "${GITHUB_OUTPUT}"

      - name: Verify Hangar token is configured
        env:
          HANGAR_API_TOKEN: ${{ secrets.HANGAR_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HANGAR_API_TOKEN}" ]; then
            echo "HANGAR_API_TOKEN secret is not configured." >&2
            exit 1
          fi

      - name: Publish to Hangar
        env:
          HANGAR_API_TOKEN: ${{ secrets.HANGAR_API_TOKEN }}
          HANGAR_CHANNEL: Release
          HANGAR_JAR: ${{ steps.asset.outputs.jar_path }}
          HANGAR_VERSION: ${{ env.RELEASE_VERSION }}
          HANGAR_CHANGELOG: ${{ env.HANGAR_CHANGELOG }}
        run: ./gradlew :uSkyBlock-Plugin:publishPluginPublicationToHangar --stacktrace --no-daemon --no-configuration-cache

      - name: Summarize manual follow-up
        run: |
          echo "Hangar release published for ${RELEASE_TAG}." >> "${GITHUB_STEP_SUMMARY}"
