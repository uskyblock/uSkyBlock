name: Live-server integration harness

on:
  schedule:
    - cron: '17 3 * * *'
  pull_request:
    paths:
      - 'uSkyBlock-ittest/**'
      - 'uSkyBlock-itclient/**'
      - 'scripts/ittest/**'
      - '.github/workflows/live-server-ittest.yml'
  workflow_dispatch:
    inputs:
      lane:
        description: Harness lane to run
        required: true
        type: choice
        default: both
        options: [both, core-stable, latest-canary]
      minecraft_version:
        description: Optional Minecraft/Paper version override
        required: false
        type: string
      paper_build:
        description: Optional Paper build ID override
        required: false
        type: string
      replay_manifest:
        description: Optional repository-relative run-manifest.json to replay
        required: false
        type: string

permissions:
  contents: read

jobs:
  changes:
    # A scheduled run is pointless when nothing changed; only spend the (expensive) live-server
    # harness on new commits. Manual dispatch always runs.
    if: github.repository_owner == 'uskyblock'
    runs-on: ubuntu-24.04
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "${EVENT_NAME}" != 'schedule' ]]; then
            echo "Manual dispatch: running harness."
            echo "run=true" >> "${GITHUB_OUTPUT}"
          elif [[ -n "$(git log --since='24 hours ago' --format='%H' -1)" ]]; then
            echo "New commits in the last 24h: running harness."
            echo "run=true" >> "${GITHUB_OUTPUT}"
          else
            echo "No commits in the last 24h: skipping scheduled harness."
            echo "run=false" >> "${GITHUB_OUTPUT}"
          fi

  live_server:
    needs: changes
    # matrix.* is not available in a job-level if, so gate lane selection at the step level below.
    if: needs.changes.outputs.run == 'true'
    strategy:
      fail-fast: false
      matrix:
        lane: [core-stable, latest-canary]
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: JDK 21 (build toolchain) + 25 (server runtime)
        uses: actions/setup-java@v5
        with:
          java-version: |
            21
            25
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Run ${{ matrix.lane }}
        id: harness
        if: github.event_name == 'schedule' || (github.event_name == 'pull_request' && matrix.lane == 'core-stable') || inputs.lane == 'both' || inputs.lane == matrix.lane
        continue-on-error: true
        env:
          OVERRIDE_MINECRAFT: ${{ inputs.minecraft_version }}
          OVERRIDE_PAPER_BUILD: ${{ inputs.paper_build }}
          REPLAY_MANIFEST: ${{ inputs.replay_manifest }}
        run: |
          args=(--lane "${{ matrix.lane }}")
          if [[ -n "${OVERRIDE_MINECRAFT}" ]]; then args+=(--minecraft "${OVERRIDE_MINECRAFT}"); fi
          if [[ -n "${OVERRIDE_PAPER_BUILD}" ]]; then args+=(--paper-build "${OVERRIDE_PAPER_BUILD}"); fi
          if [[ -n "${REPLAY_MANIFEST}" ]]; then args+=(--manifest "${REPLAY_MANIFEST}"); fi
          set +e
          scripts/ittest/run "${args[@]}"
          code=$?
          set -e
          echo "exit-code=${code}" >> "${GITHUB_OUTPUT}"
          exit "${code}"

      - name: Publish manifest and verdicts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: uskyblock-ittest-${{ matrix.lane }}-summary
          path: |
            build/ittest/runs/**/run-manifest.json
            build/ittest/runs/**/results/*.jsonl
            build/ittest/runs/**/results/state.properties
          if-no-files-found: warn

      - name: Publish failure diagnostics
        if: always() && steps.harness.outcome == 'failure'
        uses: actions/upload-artifact@v6
        with:
          name: uskyblock-ittest-${{ matrix.lane }}-diagnostics
          path: build/ittest/runs/
          if-no-files-found: warn

      - name: Enforce harness outcome
        # Any non-zero harness exit (continue-on-error -> outcome 'failure') is a red build; a lane
        # that was not selected is 'skipped' and must not fail the job.
        if: steps.harness.outcome == 'failure'
        run: |
          echo "Harness failed. Exit code: ${{ steps.harness.outputs.exit-code }}"
          exit 1
