concepts:
  island: "Player-owned skyblock home/base."
  challenge: "Objective/task to complete."
  rank: "Challenge progression tier."
  party: "Island member group."
  leader: "Party owner/leader."
  warp: "Teleport point."
  click_here: "Generic UI call to action."
  trust: "Permission to build/interact on an island."
  member: "Member of an island party."
  invite: "Invitation to join an island party."
  locked: "Island access state that blocks visitors."
  spawn: "Server/world spawn location."
  cooldown: "Required wait time before reusing an action."
  leaderboard: "Ranked top list of islands/players."
  schematic: "Template used to generate an island."
  orphan: "Abandoned/unassigned island (technical admin term for islands pending cleanup/reassignment)."

