# Harness fixture challenge catalog (schemaVersion 1). The live-server harness deploys this
# as plugins/uSkyBlock/challenges.yml. It defines the single challenge the scenarios exercise:
# `ittest_trade` hands in 5 stone (consumed on completion) for a deterministic 2-emerald reward.
# No unlock requirements, so a fresh-island fixture player can complete it immediately.
schemaVersion: 1
ranks:
  integration:
    display:
      name: "<green>Integration fixture"
    lockedDisplayItem: "minecraft:barrier"
    challenges:
      ittest_trade:
        display:
          name: "<yellow>Integration inventory trade"
          description: "Trade five stone while preserving unrelated inventory."
          item: "minecraft:emerald"
        complete:
          - type: inventory-items
            items:
              - item: "minecraft:stone"
                amount: 5
        rewards:
          first:
            - type: item
              items:
                - item: "minecraft:emerald"
                  amount: 2
